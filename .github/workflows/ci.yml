name: CI

on:
  push:
    branches:
      - main
      - master
      - "tairanwang/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  windows-portable-client:
    name: Windows portable client
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests and build release ZIP
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: VibeReady-Windows-x64
          path: dist/VibeReady-Windows-x64.zip
          if-no-files-found: error
