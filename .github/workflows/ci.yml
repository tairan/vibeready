name: CI

on:
  push:
    branches:
      - main
      - master
      - "tairanwang/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  windows-portable-client:
    name: Windows portable client
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release ZIP
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Verify release ZIP contents
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = Join-Path $PWD "dist\VibeReady-Windows-x64.zip"
          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Missing ZIP: $zipPath"
          }

          $extractPath = Join-Path $PWD "dist\ci-zip-check"
          if (Test-Path -LiteralPath $extractPath) {
            Remove-Item -LiteralPath $extractPath -Recurse -Force
          }
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath

          $required = @("VibeReady.exe", "README.txt", "THIRD-PARTY-NOTICES.txt")
          foreach ($item in $required) {
            $path = Join-Path $extractPath $item
            if (-not (Test-Path -LiteralPath $path)) {
              throw "ZIP is missing $item"
            }
          }

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: VibeReady-Windows-x64
          path: dist/VibeReady-Windows-x64.zip
          if-no-files-found: error
